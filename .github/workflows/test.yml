name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Verify action bundle is fresh
        run: |
          npm run bundle:action
          if ! git diff --quiet -- dist-action; then
            echo "::error::dist-action is stale. Run 'npm run bundle:action' and commit."
            git diff --stat -- dist-action
            exit 1
          fi
